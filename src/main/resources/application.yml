spring:
  application:
    name: bank-aplication
  flyway:
    lock-retry-count: 10
    create-schemas: true
    schemas: bank
    default-schema: bank
    enabled: true
    loggers: slf4j

  datasource:
    url: jdbc:oracle:thin:@//${ORACLE_HOST:localhost}:${ORACLE_PORT:1522}/${ORACLE_DB:FREEPDB1}
    username: ${ORACLE_USER:bank}
    password: ${ORACLE_PASSWORD:bank1234}
    driver-class-name: oracle.jdbc.OracleDriver


